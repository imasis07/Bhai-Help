kind = "web"
previewPath = "/"
title = "ROASTrack Landing Page"
version = "1.0.0"
id = "artifacts/roastrack-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5173

[services.development]
run = "pnpm --filter @workspace/roastrack-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/roastrack-landing", "run", "build" ]
publicDir = "artifacts/roastrack-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5173"
BASE_PATH = "/"
